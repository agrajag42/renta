server {
    listen LISTEN_PORT;
    server_name _;

    root /usr/share/nginx/html;

    # Redirect /friends/renta to /friends/renta/
    location = /friends/renta {
        rewrite ^ /friends/renta/ permanent;
    }

    # Serve static files
    location /friends/renta/ {
        alias /usr/share/nginx/html/friends/renta/;
        try_files $uri $uri/ /friends/renta/index.html;
    }

    # Proxy feedback API to FastAPI
    location /friends/renta/api/ {
        proxy_pass http://127.0.0.1:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Health check for Cloud Run
    location / {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
